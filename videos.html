<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos — Free Fire Fan Hub</title>
<meta name="description" content="Free Fire gameplay videos, tips and highlights.">
<style>
  :root{
    --bg:#0d0f11; --bg-raised:#15181b; --bg-card:#1a1e22; --line:#2a2f34;
    --amber:#ffb020; --red-alert:#ff4b3e; --text:#eef1f3; --text-dim:#8b939a; --text-faint:#565d63;
    --font-display:'Rajdhani','Oswald','Arial Narrow',sans-serif; --font-body:'Inter','Segoe UI',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--font-body); }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; } img{ max-width:100%; display:block; }
  .wrap{ max-width:1100px; margin:0 auto; padding:0 20px; }
  header{ position:sticky; top:0; z-index:100; background:rgba(13,15,17,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .navbar{ display:flex; align-items:center; justify-content:space-between; height:64px; }
  .brand{ font-family:var(--font-display); font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; }
  .brand svg{ color:var(--amber); }
  .btn-ghost{ font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; background:transparent; color:var(--text); padding:9px 16px; border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--amber); color:var(--amber); }
  .bracket{ position:relative; border:1px solid var(--line); background:var(--bg-card); }
  .bracket::before,.bracket::after{ content:""; position:absolute; width:14px; height:14px; border:2px solid var(--amber); opacity:.85; }
  .bracket::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .bracket::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); display:flex; align-items:center; gap:8px; }
  .eyebrow::before{ content:""; width:16px; height:1px; background:var(--amber); }
  .page-head{ padding:44px 0 24px; border-bottom:1px solid var(--line); }
  .page-head h1{ font-family:var(--font-display); font-weight:700; font-size:38px; text-transform:uppercase; margin-top:8px; }
  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:22px; }
  .chip{ font-family:var(--font-mono); font-size:11.5px; letter-spacing:.04em; text-transform:uppercase; background:transparent; border:1px solid var(--line); color:var(--text-dim); padding:9px 14px; }
  .chip.active{ border-color:var(--amber); color:var(--amber); background:rgba(255,176,32,.06); }
  section{ padding:32px 0 60px; }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .video-card{ overflow:hidden; cursor:pointer; }
  .video-card .thumb{ aspect-ratio:16/9; background:linear-gradient(135deg,#22262a,#141618); position:relative; overflow:hidden; }
  .video-card .thumb img{ width:100%; height:100%; object-fit:cover; }
  .play-icon{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .play-icon svg{ width:44px; height:44px; color:#fff; opacity:.9; filter:drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
  .duration{ position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,.7); color:#fff; font-family:var(--font-mono); font-size:10.5px; padding:2px 7px; }
  .video-card .body{ padding:14px 16px; }
  .video-card h3{ font-family:var(--font-display); font-weight:600; font-size:15.5px; line-height:1.3; }
  .video-card .meta{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-top:6px; }

  .overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .overlay.show{ display:flex; }
  .player-wrap{ width:100%; max-width:900px; }
  .player{ width:100%; aspect-ratio:16/9; background:#000; }
  .player iframe{ width:100%; height:100%; border:0; }
  .player-title{ margin-top:14px; font-family:var(--font-display); font-weight:600; font-size:17px; }
  .close-btn{ position:absolute; top:20px; right:20px; width:38px; height:38px; background:transparent; border:1px solid var(--line); color:#fff; }

  @media(max-width:900px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  @media(max-width:560px){ .grid{ grid-template-columns:1fr; } }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
</style>
</head>
<body>
<header>
  <div class="wrap navbar">
    <a href="index.html" class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C12 2 7 7.5 7 12.5C7 15 8.2 16.7 9.5 17.5C9 16.5 9 15 9.5 14C10 15.5 11 16 11 16C10.5 14 11 12 12.5 10.5C12 12.5 12.5 14 13.5 14.5C13 12 14 9.5 16 8C15 10 15.5 12 16.5 13C17 13.7 17.5 14.7 17.5 16C17.5 19 15 21.5 12 21.5C9 21.5 6.5 19.3 6.5 16.3C6.5 11 12 2 12 2Z" fill="currentColor"/></svg>
      FREE FIRE HUB
    </a>
    <a href="index.html" class="btn-ghost">← Back to Home</a>
  </div>
</header>

<div class="page-head wrap">
  <div class="eyebrow">Watch &amp; Learn</div>
  <h1>Videos</h1>
  <div class="chip-row" id="catChips">
    <button class="chip active" data-cat="all">All</button>
    <button class="chip" data-cat="gameplay">Gameplay</button>
    <button class="chip" data-cat="tips">Tips &amp; Tricks</button>
    <button class="chip" data-cat="highlights">Highlights</button>
  </div>
</div>

<section class="wrap">
  <div class="grid" id="videoGrid"></div>
</section>

<div class="overlay" id="overlay">
  <button class="close-btn" id="closeBtn">✕</button>
  <div class="player-wrap">
    <div class="player" id="playerBox"></div>
    <div class="player-title" id="playerTitle"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCGedP2oNKGRxI4VHAa2rD1uS7kvlu7278", authDomain: "freefire-6e80e.firebaseapp.com",
    projectId: "freefire-6e80e", storageBucket: "freefire-6e80e.firebasestorage.app",
    messagingSenderId: "249508261364", appId: "1:249508261364:web:b846118ee5952e3b099da1", measurementId: "G-W85RYGBJE0"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const FALLBACK = [
    { id:"v1", title:"New Evo Gun Gameplay", category:"gameplay", views:"25K", age:"2 days ago", youtubeId:"" },
    { id:"v2", title:"Top 10 Headshot Tips", category:"tips", views:"18K", age:"2 days ago", youtubeId:"" },
    { id:"v3", title:"Rank Push Tricks", category:"tips", views:"19K", age:"3 days ago", youtubeId:"" },
    { id:"v4", title:"Solo vs Squad Gameplay", category:"highlights", views:"20K", age:"3 days ago", youtubeId:"" },
  ];

  let items = [], activeCat = "all";

  async function load(){
    try {
      const snap = await getDocs(collection(db, "videos"));
      items = snap.empty ? FALLBACK : snap.docs.map(d => ({ id:d.id, ...d.data() }));
    } catch (e) { console.warn("videos load failed:", e.message); items = FALLBACK; }
    render();
  }

  function escapeHtml(str){ return String(str??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  function render(){
    const filtered = activeCat === "all" ? items : items.filter(i => i.category === activeCat);
    const grid = document.getElementById("videoGrid");
    if (!filtered.length) { grid.innerHTML = `<div style="grid-column:1/-1;color:var(--text-dim);padding:40px;text-align:center;">எதுவும் இல்ல.</div>`; return; }
    grid.innerHTML = filtered.map(v => `
      <div class="video-card bracket" data-id="${v.id}">
        <div class="thumb">
          ${v.thumbnailUrl ? `<img src="${v.thumbnailUrl}" alt="${escapeHtml(v.title)}">`:''}
          <div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.4)"/><path d="M10 8l6 4-6 4V8Z" fill="#fff"/></svg></div>
          ${v.duration ? `<span class="duration">${escapeHtml(v.duration)}</span>`:''}
        </div>
        <div class="body">
          <h3>${escapeHtml(v.title)}</h3>
          <div class="meta">${escapeHtml(v.views||'0')} views · ${escapeHtml(v.age||'')}</div>
        </div>
      </div>`).join("");
    grid.querySelectorAll(".video-card").forEach(card => card.addEventListener("click", () => openPlayer(card.dataset.id)));
  }

  function openPlayer(id){
    const v = items.find(i => i.id === id);
    if (!v) return;
    document.getElementById("playerTitle").textContent = v.title;
    const box = document.getElementById("playerBox");
    box.innerHTML = v.youtubeId
      ? `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(v.youtubeId)}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:13px;">Video URL configure ஆகல.</div>`;
    document.getElementById("overlay").classList.add("show");
  }
  document.getElementById("closeBtn").addEventListener("click", () => {
    document.getElementById("overlay").classList.remove("show");
    document.getElementById("playerBox").innerHTML = "";
  });

  document.querySelectorAll("#catChips .chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll("#catChips .chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      activeCat = chip.dataset.cat;
      render();
    });
  });

  load();
</script>
</body>
</html>
