<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournaments — Free Fire Fan Hub</title>
<meta name="description" content="Free Fire tournaments, prize pools and registration.">
<style>
  :root{
    --bg:#0d0f11; --bg-raised:#15181b; --bg-card:#1a1e22; --line:#2a2f34;
    --amber:#ffb020; --green-ok:#34c77b; --red-alert:#ff4b3e;
    --text:#eef1f3; --text-dim:#8b939a; --text-faint:#565d63;
    --font-display:'Rajdhani','Oswald','Arial Narrow',sans-serif; --font-body:'Inter','Segoe UI',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--font-body); }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; } img{ max-width:100%; display:block; }
  .wrap{ max-width:1100px; margin:0 auto; padding:0 20px; }
  header{ position:sticky; top:0; z-index:100; background:rgba(13,15,17,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .navbar{ display:flex; align-items:center; justify-content:space-between; height:64px; }
  .brand{ font-family:var(--font-display); font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; }
  .brand svg{ color:var(--amber); }
  .btn-ghost{ font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; background:transparent; color:var(--text); padding:9px 16px; border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--amber); color:var(--amber); }
  .bracket{ position:relative; border:1px solid var(--line); background:var(--bg-card); }
  .bracket::before,.bracket::after{ content:""; position:absolute; width:14px; height:14px; border:2px solid var(--amber); opacity:.85; }
  .bracket::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .bracket::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); display:flex; align-items:center; gap:8px; }
  .eyebrow::before{ content:""; width:16px; height:1px; background:var(--amber); }
  .page-head{ padding:44px 0 24px; border-bottom:1px solid var(--line); }
  .page-head h1{ font-family:var(--font-display); font-weight:700; font-size:38px; text-transform:uppercase; margin-top:8px; }
  .tabs{ display:flex; gap:2px; margin:28px 0 0; }
  .tabs button{ background:transparent; border:1px solid var(--line); border-bottom:none; color:var(--text-dim); padding:11px 18px; font-family:var(--font-mono); font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
  .tabs button.active{ color:var(--amber); background:var(--bg-card); border-color:var(--amber); }

  section{ padding:32px 0 60px; }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .t-card{ overflow:hidden; }
  .t-card .thumb{ aspect-ratio:16/9; background:linear-gradient(135deg,#22262a,#141618); position:relative; overflow:hidden; }
  .t-card .thumb img{ width:100%; height:100%; object-fit:cover; }
  .t-card .body{ padding:16px; }
  .t-card h3{ font-family:var(--font-display); font-weight:600; font-size:17px; }
  .prize{ font-family:var(--font-mono); font-size:11.5px; color:var(--amber); margin-top:6px; }
  .date{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-top:4px; }
  .btn-reg{
    display:inline-flex; align-items:center; gap:6px; margin-top:14px;
    font-family:var(--font-mono); font-size:11.5px; font-weight:500; letter-spacing:.06em; text-transform:uppercase;
    background:var(--amber); color:#151505; padding:9px 16px; border:none;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  }
  .btn-reg.registered{ background:rgba(52,199,123,.12); color:var(--green-ok); }
  .btn-reg:disabled{ opacity:.6; }

  .empty-state{ padding:60px 20px; text-align:center; color:var(--text-dim); font-size:13.5px; grid-column:1/-1; }
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-card); border:1px solid var(--amber); color:var(--text); padding:12px 20px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s ease; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media(max-width:900px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  @media(max-width:560px){ .grid{ grid-template-columns:1fr; } .tabs{ flex-wrap:wrap; } }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
</style>
</head>
<body>
<header>
  <div class="wrap navbar">
    <a href="index.html" class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C12 2 7 7.5 7 12.5C7 15 8.2 16.7 9.5 17.5C9 16.5 9 15 9.5 14C10 15.5 11 16 11 16C10.5 14 11 12 12.5 10.5C12 12.5 12.5 14 13.5 14.5C13 12 14 9.5 16 8C15 10 15.5 12 16.5 13C17 13.7 17.5 14.7 17.5 16C17.5 19 15 21.5 12 21.5C9 21.5 6.5 19.3 6.5 16.3C6.5 11 12 2 12 2Z" fill="currentColor"/></svg>
      FREE FIRE HUB
    </a>
    <a href="index.html" class="btn-ghost">← Back to Home</a>
  </div>
</header>

<div class="page-head wrap">
  <div class="eyebrow">Compete &amp; Win</div>
  <h1>Tournaments</h1>
  <div class="tabs">
    <button data-tab="all" class="active">All</button>
    <button data-tab="ongoing">Ongoing</button>
    <button data-tab="upcoming">Upcoming</button>
    <button data-tab="completed">Completed</button>
  </div>
</div>

<section class="wrap">
  <div class="grid" id="tGrid"></div>
</section>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGedP2oNKGRxI4VHAa2rD1uS7kvlu7278", authDomain: "freefire-6e80e.firebaseapp.com",
    projectId: "freefire-6e80e", storageBucket: "freefire-6e80e.firebasestorage.app",
    messagingSenderId: "249508261364", appId: "1:249508261364:web:b846118ee5952e3b099da1", measurementId: "G-W85RYGBJE0"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let items = [], activeTab = "all", registeredSet = new Set();

  const FALLBACK = [
    { id:"fb1", title:"FF Champions Cup", prizePool:"₹14,000", date:"May 25, 2024", status:"ongoing" },
    { id:"fb2", title:"Booyah Invitational", prizePool:"₹25,000", date:"Jun 5, 2024", status:"upcoming" },
    { id:"fb3", title:"Rampage Cup", prizePool:"₹10,000", date:"Jun 12, 2024", status:"upcoming" },
  ];

  function escapeHtml(str){ return String(str??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove("show"),2400); }

  async function loadRegistrations(uid){
    try {
      const snap = await getDocs(collection(db, "tournamentRegistrations"));
      registeredSet = new Set(snap.docs.filter(d => d.data().uid === uid).map(d => d.data().tournamentId));
    } catch (e) { console.warn("registrations load failed:", e.message); }
  }

  async function load(){
    try {
      const snap = await getDocs(collection(db, "tournaments"));
      items = snap.empty ? FALLBACK : snap.docs.map(d => ({ id:d.id, ...d.data() }));
    } catch (e) { console.warn("tournaments load failed:", e.message); items = FALLBACK; }
    render();
  }

  function render(){
    const filtered = activeTab === "all" ? items : items.filter(i => i.status === activeTab);
    const grid = document.getElementById("tGrid");
    if (!filtered.length) { grid.innerHTML = `<div class="empty-state">இந்த category-ல tournaments இல்ல.</div>`; return; }
    grid.innerHTML = filtered.map(t => {
      const isReg = registeredSet.has(t.id);
      const closed = t.status === "completed";
      return `
      <div class="t-card bracket" data-id="${t.id}">
        <div class="thumb">${t.imageUrl ? `<img src="${t.imageUrl}" alt="${escapeHtml(t.title)}">`:''}</div>
        <div class="body">
          <h3>${escapeHtml(t.title)}</h3>
          <div class="prize">Prize Pool: ${escapeHtml(t.prizePool||'TBA')}</div>
          <div class="date">${escapeHtml(t.date||'')}</div>
          <button class="btn-reg ${isReg?'registered':''}" data-id="${t.id}" ${closed?'disabled':''}>
            ${closed ? 'Closed' : (isReg ? '✓ Registered' : 'Register Now')}
          </button>
        </div>
      </div>`;
    }).join("");

    grid.querySelectorAll(".btn-reg:not(:disabled)").forEach(btn => {
      btn.addEventListener("click", () => handleRegister(btn));
    });
  }

  async function handleRegister(btn){
    const id = btn.dataset.id;
    if (!currentUser) { window.location.href = "login.html?redirect=tournaments.html"; return; }
    const docId = `${currentUser.uid}_${id}`;
    if (btn.classList.contains("registered")) {
      try {
        await deleteDoc(doc(db, "tournamentRegistrations", docId));
        registeredSet.delete(id);
        showToast("Registration cancelled.");
        render();
      } catch (e) { showToast("Error: " + e.message); }
      return;
    }
    btn.disabled = true; btn.textContent = "…";
    try {
      await setDoc(doc(db, "tournamentRegistrations", docId), {
        uid: currentUser.uid, tournamentId: id, registeredAt: serverTimestamp()
      });
      registeredSet.add(id);
      showToast("Registered successfully!");
      render();
    } catch (e) {
      showToast("Error: " + e.message);
      btn.disabled = false;
    }
  }

  document.querySelectorAll(".tabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      render();
    });
  });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) await loadRegistrations(user.uid);
    render();
  });

  load();
</script>
</body>
</html>
