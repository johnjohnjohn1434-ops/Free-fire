<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream — Free Fire Fan Hub</title>
<meta name="description" content="Watch Free Fire live streams and chat with the community.">
<style>
  :root{
    --bg:#0d0f11; --bg-raised:#15181b; --bg-card:#1a1e22; --line:#2a2f34;
    --amber:#ffb020; --red-alert:#ff4b3e; --text:#eef1f3; --text-dim:#8b939a; --text-faint:#565d63;
    --font-display:'Rajdhani','Oswald','Arial Narrow',sans-serif; --font-body:'Inter','Segoe UI',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--font-body); }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; }
  .wrap{ max-width:1100px; margin:0 auto; padding:0 20px; }
  header{ position:sticky; top:0; z-index:100; background:rgba(13,15,17,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .navbar{ display:flex; align-items:center; justify-content:space-between; height:64px; }
  .brand{ font-family:var(--font-display); font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; }
  .brand svg{ color:var(--amber); }
  .btn-ghost{ font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; background:transparent; color:var(--text); padding:9px 16px; border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--amber); color:var(--amber); }
  .bracket{ position:relative; border:1px solid var(--line); background:var(--bg-card); }
  .bracket::before,.bracket::after{ content:""; position:absolute; width:14px; height:14px; border:2px solid var(--amber); opacity:.85; }
  .bracket::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .bracket::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  section{ padding:28px 0 60px; }
  .layout{ display:grid; grid-template-columns:1.5fr .8fr; gap:20px; align-items:start; }

  .player-frame{ aspect-ratio:16/9; background:#000; position:relative; overflow:hidden; }
  .player-frame iframe{ width:100%; height:100%; border:0; }
  .player-frame .placeholder{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:13px; flex-direction:column; gap:10px; }
  .live-badge{ position:absolute; top:14px; left:14px; background:var(--red-alert); color:#fff; font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; padding:5px 10px; display:flex; align-items:center; gap:6px; z-index:2; }
  .live-badge .dot{ width:6px; height:6px; border-radius:50%; background:#fff; animation:pulse 1.4s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.25;} }
  .watching{ position:absolute; top:14px; right:14px; background:rgba(0,0,0,.6); color:#fff; font-family:var(--font-mono); font-size:11px; padding:5px 10px; z-index:2; display:flex; align-items:center; gap:6px; }

  .stream-info{ padding:18px 4px; }
  .stream-info h1{ font-family:var(--font-display); font-weight:700; font-size:24px; text-transform:uppercase; }
  .stream-info .streamer{ font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim); margin-top:6px; }

  .chat-panel{ display:flex; flex-direction:column; height:600px; }
  .chat-head{ padding:14px 16px; border-bottom:1px solid var(--line); font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--amber); }
  .chat-messages{ flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
  .chat-msg{ font-size:13px; line-height:1.5; }
  .chat-msg .user{ font-weight:600; color:var(--amber); }
  .chat-msg .user.me{ color:#7ee7ab; }
  .chat-empty{ color:var(--text-faint); font-size:12.5px; text-align:center; padding:20px; }
  .chat-input-row{ display:flex; border-top:1px solid var(--line); }
  .chat-input-row input{ flex:1; background:var(--bg-raised); border:none; color:var(--text); padding:12px 14px; font-size:13.5px; }
  .chat-input-row input:focus{ outline:none; }
  .chat-input-row button{ background:var(--amber); color:#151505; border:none; padding:0 18px; font-family:var(--font-mono); font-size:12px; text-transform:uppercase; }
  .chat-input-row button:disabled{ opacity:.5; }
  .login-prompt{ padding:14px 16px; text-align:center; font-size:12.5px; color:var(--text-dim); border-top:1px solid var(--line); }
  .login-prompt a{ color:var(--amber); }

  @media(max-width:900px){ .layout{ grid-template-columns:1fr; } .chat-panel{ height:400px; } }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
</style>
</head>
<body>
<header>
  <div class="wrap navbar">
    <a href="index.html" class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C12 2 7 7.5 7 12.5C7 15 8.2 16.7 9.5 17.5C9 16.5 9 15 9.5 14C10 15.5 11 16 11 16C10.5 14 11 12 12.5 10.5C12 12.5 12.5 14 13.5 14.5C13 12 14 9.5 16 8C15 10 15.5 12 16.5 13C17 13.7 17.5 14.7 17.5 16C17.5 19 15 21.5 12 21.5C9 21.5 6.5 19.3 6.5 16.3C6.5 11 12 2 12 2Z" fill="currentColor"/></svg>
      FREE FIRE HUB
    </a>
    <a href="index.html" class="btn-ghost">← Back to Home</a>
  </div>
</header>

<section class="wrap layout">
  <div>
    <div class="player-frame bracket" id="playerFrame">
      <span class="live-badge"><span class="dot"></span> LIVE</span>
      <span class="watching" id="watchingCount">12.5K watching</span>
      <div class="placeholder" id="playerPlaceholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="playerMsg">Stream configure ஆகல். Admin panel-ல YouTube live URL add பண்ணுங்க.</span>
      </div>
    </div>
    <div class="stream-info">
      <h1 id="streamTitle">Free Fire Live with Giveaway</h1>
      <div class="streamer" id="streamerName">Loading…</div>
    </div>
  </div>

  <div class="chat-panel bracket">
    <div class="chat-head">Live Chat</div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty">Loading chat…</div>
    </div>
    <div id="chatFooter"></div>
  </div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, collection, query, orderBy, limit,
    onSnapshot, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGedP2oNKGRxI4VHAa2rD1uS7kvlu7278", authDomain: "freefire-6e80e.firebaseapp.com",
    projectId: "freefire-6e80e", storageBucket: "freefire-6e80e.firebasestorage.app",
    messagingSenderId: "249508261364", appId: "1:249508261364:web:b846118ee5952e3b099da1", measurementId: "G-W85RYGBJE0"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  function escapeHtml(str){ return String(str??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  function extractYouTubeId(url){
    if (!url) return null;
    const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{6,})/);
    return m ? m[1] : null;
  }

  // ---- load stream settings ----
  async function loadStream(){
    try {
      const snap = await getDoc(doc(db, "settings", "liveStream"));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById("streamTitle").textContent = d.title || "Free Fire Live";
        document.getElementById("streamerName").textContent = d.streamerName || "";
        document.getElementById("watchingCount").innerHTML = `👁 ${d.viewerCount || 0} watching`;
        const ytId = extractYouTubeId(d.youtubeUrl);
        if (ytId && d.isLive !== false) {
          document.getElementById("playerFrame").innerHTML =
            `<span class="live-badge"><span class="dot"></span> LIVE</span>
             <span class="watching">👁 ${d.viewerCount || 0} watching</span>
             <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }
        return;
      }
    } catch (e) { console.warn("stream settings load failed:", e.message); }
    document.getElementById("streamerName").textContent = "Offline — check back later";
  }

  // ---- live chat (realtime) ----
  function initChat(){
    const q = query(collection(db, "liveChat"), orderBy("createdAt", "desc"), limit(50));
    onSnapshot(q, (snap) => {
      const box = document.getElementById("chatMessages");
      if (snap.empty) { box.innerHTML = `<div class="chat-empty">முதல் message-ஐ நீங்க தான் அனுப்பலாம்!</div>`; return; }
      const msgs = snap.docs.map(d => d.data()).reverse();
      box.innerHTML = msgs.map(m => `
        <div class="chat-msg">
          <span class="user ${currentUser && m.uid === currentUser.uid ? 'me' : ''}">${escapeHtml(m.name)}:</span>
          ${escapeHtml(m.text)}
        </div>`).join("");
      box.scrollTop = box.scrollHeight;
    }, (err) => {
      document.getElementById("chatMessages").innerHTML = `<div class="chat-empty">Chat load failed: ${escapeHtml(err.message)}</div>`;
    });
  }

  function renderChatFooter(){
    const footer = document.getElementById("chatFooter");
    if (currentUser) {
      footer.innerHTML = `
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Say something…" maxlength="200">
          <button id="chatSend">Send</button>
        </div>`;
      document.getElementById("chatSend").addEventListener("click", sendMessage);
      document.getElementById("chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });
    } else {
      footer.innerHTML = `<div class="login-prompt">Chat பண்ண <a href="login.html?redirect=live.html">Login</a> பண்ணுங்க.</div>`;
    }
  }

  async function sendMessage(){
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if (!text || !currentUser) return;
    input.disabled = true;
    try {
      await addDoc(collection(db, "liveChat"), {
        uid: currentUser.uid,
        name: currentUser.displayName || "Player",
        text,
        createdAt: serverTimestamp()
      });
      input.value = "";
    } catch (e) { console.warn("send failed:", e.message); }
    input.disabled = false;
    input.focus();
  }

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    renderChatFooter();
  });

  loadStream();
  initChat();
</script>
</body>
</html>
