<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — Free Fire Fan Hub</title>
<meta name="description" content="Free Fire community discussions, tips and posts.">
<style>
  :root{
    --bg:#0d0f11; --bg-raised:#15181b; --bg-card:#1a1e22; --line:#2a2f34;
    --amber:#ffb020; --red-alert:#ff4b3e; --text:#eef1f3; --text-dim:#8b939a; --text-faint:#565d63;
    --font-display:'Rajdhani','Oswald','Arial Narrow',sans-serif; --font-body:'Inter','Segoe UI',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--font-body); }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; }
  .wrap{ max-width:720px; margin:0 auto; padding:0 20px; }
  header{ position:sticky; top:0; z-index:100; background:rgba(13,15,17,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .navbar{ max-width:1100px; margin:0 auto; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:64px; }
  .brand{ font-family:var(--font-display); font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; }
  .brand svg{ color:var(--amber); }
  .btn-ghost{ font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; background:transparent; color:var(--text); padding:9px 16px; border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--amber); color:var(--amber); }
  .bracket{ position:relative; border:1px solid var(--line); background:var(--bg-card); }
  .bracket::before,.bracket::after{ content:""; position:absolute; width:14px; height:14px; border:2px solid var(--amber); opacity:.85; }
  .bracket::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .bracket::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); display:flex; align-items:center; gap:8px; }
  .eyebrow::before{ content:""; width:16px; height:1px; background:var(--amber); }
  .page-head{ padding:40px 0 22px; }
  .page-head h1{ font-family:var(--font-display); font-weight:700; font-size:32px; text-transform:uppercase; margin-top:8px; }

  section{ padding-bottom:60px; }

  .composer{ padding:16px; margin-bottom:20px; }
  .composer textarea{ width:100%; background:var(--bg-raised); border:1px solid var(--line); color:var(--text); font-size:14px; padding:12px; min-height:70px; resize:vertical; font-family:var(--font-body); }
  .composer textarea:focus{ outline:none; border-color:var(--amber); }
  .composer-footer{ display:flex; justify-content:flex-end; margin-top:10px; }
  .btn-post{
    font-family:var(--font-mono); font-size:12px; font-weight:500; letter-spacing:.06em; text-transform:uppercase;
    background:var(--amber); color:#151505; padding:9px 18px; border:none;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  }
  .btn-post:disabled{ opacity:.5; }
  .login-cta{ padding:20px; text-align:center; font-size:13.5px; color:var(--text-dim); margin-bottom:20px; }
  .login-cta a{ color:var(--amber); }

  .post{ padding:18px; margin-bottom:14px; }
  .post-head{ display:flex; align-items:center; gap:10px; }
  .avatar{ width:38px; height:38px; border-radius:50%; background:var(--bg-raised); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--amber); flex-shrink:0; overflow:hidden; }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .post-author{ font-family:var(--font-display); font-weight:600; font-size:14.5px; }
  .post-time{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); }
  .post-body{ margin-top:12px; font-size:14px; line-height:1.6; color:#dfe3e6; white-space:pre-line; }
  .post-actions{ display:flex; gap:20px; margin-top:14px; }
  .action-btn{ display:flex; align-items:center; gap:6px; background:none; border:none; color:var(--text-dim); font-size:12.5px; font-family:var(--font-mono); }
  .action-btn svg{ width:16px; height:16px; }
  .action-btn.liked{ color:var(--red-alert); }
  .action-btn:hover{ color:var(--amber); }

  .comments{ margin-top:14px; border-top:1px solid var(--line); padding-top:12px; display:none; }
  .comments.show{ display:block; }
  .comment{ font-size:13px; margin-bottom:8px; }
  .comment .user{ font-weight:600; color:var(--amber); }
  .comment-input-row{ display:flex; gap:8px; margin-top:10px; }
  .comment-input-row input{ flex:1; background:var(--bg-raised); border:1px solid var(--line); color:var(--text); padding:9px 10px; font-size:13px; }
  .comment-input-row button{ background:var(--amber); color:#151505; border:none; padding:0 14px; font-family:var(--font-mono); font-size:11px; text-transform:uppercase; }

  .empty-state{ padding:50px 20px; text-align:center; color:var(--text-dim); font-size:13.5px; }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
</style>
</head>
<body>
<header>
  <div class="navbar">
    <a href="index.html" class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C12 2 7 7.5 7 12.5C7 15 8.2 16.7 9.5 17.5C9 16.5 9 15 9.5 14C10 15.5 11 16 11 16C10.5 14 11 12 12.5 10.5C12 12.5 12.5 14 13.5 14.5C13 12 14 9.5 16 8C15 10 15.5 12 16.5 13C17 13.7 17.5 14.7 17.5 16C17.5 19 15 21.5 12 21.5C9 21.5 6.5 19.3 6.5 16.3C6.5 11 12 2 12 2Z" fill="currentColor"/></svg>
      FREE FIRE HUB
    </a>
    <a href="index.html" class="btn-ghost">← Back to Home</a>
  </div>
</header>

<div class="page-head wrap">
  <div class="eyebrow">Player Community</div>
  <h1>Community</h1>
</div>

<section class="wrap">
  <div id="composerArea"></div>
  <div id="postsList">
    <div class="empty-state">Loading posts…</div>
  </div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, query, orderBy, getDocs, addDoc, doc, setDoc, deleteDoc,
    serverTimestamp, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGedP2oNKGRxI4VHAa2rD1uS7kvlu7278", authDomain: "freefire-6e80e.firebaseapp.com",
    projectId: "freefire-6e80e", storageBucket: "freefire-6e80e.firebasestorage.app",
    messagingSenderId: "249508261364", appId: "1:249508261364:web:b846118ee5952e3b099da1", measurementId: "G-W85RYGBJE0"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  function escapeHtml(str){ return String(str??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function timeAgo(date){
    if (!date) return "";
    const s = Math.floor((Date.now() - date.getTime())/1000);
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s/60) + "m ago";
    if (s < 86400) return Math.floor(s/3600) + "h ago";
    return Math.floor(s/86400) + "d ago";
  }

  function renderComposer(){
    const area = document.getElementById("composerArea");
    if (currentUser) {
      area.innerHTML = `
        <div class="composer bracket">
          <textarea id="postInput" placeholder="Free Fire பத்தி என்ன நினைக்குறீங்க?" maxlength="500"></textarea>
          <div class="composer-footer"><button class="btn-post" id="postBtn">Post</button></div>
        </div>`;
      document.getElementById("postBtn").addEventListener("click", createPost);
    } else {
      area.innerHTML = `<div class="login-cta bracket">Post பண்ண <a href="login.html?redirect=community.html">Login</a> பண்ணுங்க.</div>`;
    }
  }

  async function createPost(){
    const input = document.getElementById("postInput");
    const text = input.value.trim();
    if (!text) return;
    const btn = document.getElementById("postBtn");
    btn.disabled = true; btn.textContent = "Posting…";
    try {
      await addDoc(collection(db, "communityPosts"), {
        uid: currentUser.uid,
        authorName: currentUser.displayName || "Player",
        authorPhoto: currentUser.photoURL || "",
        text,
        likeCount: 0,
        createdAt: serverTimestamp()
      });
      input.value = "";
    } catch (e) { alert("Error: " + e.message); }
    btn.disabled = false; btn.textContent = "Post";
  }

  const FALLBACK = [
    { id:"fb1", authorName:"Gaming Power", text:"Who is your favourite character in Free Fire? 🔥", likeCount:125, commentCount:64 },
    { id:"fb2", authorName:"Tamil Hunter", text:"New event is awesome! 🎮", likeCount:98, commentCount:23 },
    { id:"fb3", authorName:"FF King", text:"Pushing rank to Grandmaster 💪", likeCount:156, commentCount:67 },
  ];

  async function loadPosts(){
    const list = document.getElementById("postsList");
    try {
      const snap = await getDocs(query(collection(db, "communityPosts"), orderBy("createdAt", "desc")));
      const posts = snap.empty ? FALLBACK : snap.docs.map(d => ({ id:d.id, ...d.data() }));
      renderPosts(posts);
    } catch (e) {
      console.warn("posts load failed:", e.message);
      renderPosts(FALLBACK);
    }
  }

  function renderPosts(posts){
    const list = document.getElementById("postsList");
    if (!posts.length) { list.innerHTML = `<div class="empty-state">இன்னும் posts இல்ல. முதல் post-ஐ நீங்க போடுங்க!</div>`; return; }
    list.innerHTML = posts.map(p => {
      const initial = (p.authorName || "?").trim()[0]?.toUpperCase() || "?";
      const timeStr = p.createdAt?.toDate ? timeAgo(p.createdAt.toDate()) : "";
      return `
      <div class="post bracket" data-id="${p.id}">
        <div class="post-head">
          <div class="avatar">${p.authorPhoto ? `<img src="${p.authorPhoto}" alt="">` : initial}</div>
          <div>
            <div class="post-author">${escapeHtml(p.authorName)}</div>
            <div class="post-time">${timeStr}</div>
          </div>
        </div>
        <div class="post-body">${escapeHtml(p.text)}</div>
        <div class="post-actions">
          <button class="action-btn like-btn" data-id="${p.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 000-7.8Z"/></svg>
            <span>${p.likeCount || 0}</span>
          </button>
          <button class="action-btn comment-toggle" data-id="${p.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5Z"/></svg>
            <span>${p.commentCount || 0}</span>
          </button>
        </div>
        <div class="comments" id="comments-${p.id}"></div>
      </div>`;
    }).join("");

    list.querySelectorAll(".like-btn").forEach(btn => btn.addEventListener("click", () => toggleLike(btn.dataset.id, btn)));
    list.querySelectorAll(".comment-toggle").forEach(btn => btn.addEventListener("click", () => toggleComments(btn.dataset.id)));
  }

  async function toggleLike(postId, btn){
    if (!currentUser) { window.location.href = "login.html?redirect=community.html"; return; }
    const likeDocId = `${currentUser.uid}_${postId}`;
    try {
      const ref = doc(db, "postLikes", likeDocId);
      if (btn.classList.contains("liked")) {
        await deleteDoc(ref);
        btn.classList.remove("liked");
      } else {
        await setDoc(ref, { uid: currentUser.uid, postId, createdAt: serverTimestamp() });
        btn.classList.add("liked");
      }
    } catch (e) { console.warn("like failed:", e.message); }
  }

  function toggleComments(postId){
    const box = document.getElementById("comments-" + postId);
    const isOpen = box.classList.toggle("show");
    if (isOpen && !box.dataset.loaded) {
      box.dataset.loaded = "1";
      loadComments(postId, box);
    }
  }

  async function loadComments(postId, box){
    box.innerHTML = `<div style="color:var(--text-faint);font-size:12px;">Loading…</div>`;
    try {
      const snap = await getDocs(query(collection(db, "postComments"), orderBy("createdAt", "asc")));
      const comments = snap.docs.filter(d => d.data().postId === postId).map(d => d.data());
      box.innerHTML = (comments.length
        ? comments.map(c => `<div class="comment"><span class="user">${escapeHtml(c.authorName)}:</span> ${escapeHtml(c.text)}</div>`).join("")
        : `<div style="color:var(--text-faint);font-size:12px;">முதல் comment-ஐ நீங்க போடலாம்.</div>`
      ) + renderCommentInput(postId);
      attachCommentInput(postId, box);
    } catch (e) {
      box.innerHTML = `<div style="color:var(--text-faint);font-size:12px;">Load failed.</div>` + renderCommentInput(postId);
      attachCommentInput(postId, box);
    }
  }

  function renderCommentInput(postId){
    if (!currentUser) return `<div style="font-size:12px;color:var(--text-faint);margin-top:8px;">Comment பண்ண login பண்ணுங்க.</div>`;
    return `<div class="comment-input-row"><input type="text" id="cInput-${postId}" placeholder="Write a comment…" maxlength="200"><button id="cBtn-${postId}">Send</button></div>`;
  }

  function attachCommentInput(postId, box){
    const btn = box.querySelector(`#cBtn-${postId}`);
    if (!btn) return;
    btn.addEventListener("click", async () => {
      const input = box.querySelector(`#cInput-${postId}`);
      const text = input.value.trim();
      if (!text) return;
      btn.disabled = true;
      try {
        await addDoc(collection(db, "postComments"), {
          postId, uid: currentUser.uid, authorName: currentUser.displayName || "Player",
          text, createdAt: serverTimestamp()
        });
        input.value = "";
        box.dataset.loaded = "";
        loadComments(postId, box);
      } catch (e) { console.warn("comment failed:", e.message); }
      btn.disabled = false;
    });
  }

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    renderComposer();
  });

  loadPosts();
</script>
</body>
</html>
