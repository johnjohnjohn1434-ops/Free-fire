<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensitivity Settings — Free Fire Fan Hub</title>
<meta name="description" content="Free Fire sensitivity settings by device tier.">
<style>
  :root{
    --bg:#0d0f11; --bg-raised:#15181b; --bg-card:#1a1e22; --line:#2a2f34;
    --amber:#ffb020; --green-ok:#34c77b; --text:#eef1f3; --text-dim:#8b939a; --text-faint:#565d63;
    --font-display:'Rajdhani','Oswald','Arial Narrow',sans-serif; --font-body:'Inter','Segoe UI',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--font-body); }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; }
  .wrap{ max-width:1100px; margin:0 auto; padding:0 20px; }
  header{ position:sticky; top:0; z-index:100; background:rgba(13,15,17,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .navbar{ display:flex; align-items:center; justify-content:space-between; height:64px; }
  .brand{ font-family:var(--font-display); font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; }
  .brand svg{ color:var(--amber); }
  .btn-ghost{ font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; background:transparent; color:var(--text); padding:9px 16px; border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--amber); color:var(--amber); }
  .bracket{ position:relative; border:1px solid var(--line); background:var(--bg-card); }
  .bracket::before,.bracket::after{ content:""; position:absolute; width:14px; height:14px; border:2px solid var(--amber); opacity:.85; }
  .bracket::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .bracket::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); display:flex; align-items:center; gap:8px; }
  .eyebrow::before{ content:""; width:16px; height:1px; background:var(--amber); }
  .page-head{ padding:44px 0 24px; border-bottom:1px solid var(--line); }
  .page-head h1{ font-family:var(--font-display); font-weight:700; font-size:38px; text-transform:uppercase; margin-top:8px; }

  .tier-row{ display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
  .tier-btn{ font-family:var(--font-mono); font-size:12px; letter-spacing:.05em; text-transform:uppercase; background:var(--bg-card); border:1px solid var(--line); color:var(--text-dim); padding:10px 16px; }
  .tier-btn.active{ border-color:var(--amber); color:var(--amber); background:rgba(255,176,32,.06); }

  section{ padding:32px 0 60px; }
  .layout{ display:grid; grid-template-columns:1.3fr .7fr; gap:20px; }

  .slider-panel{ padding:26px; }
  .slider-row{ margin-bottom:22px; }
  .slider-row:last-child{ margin-bottom:0; }
  .slider-top{ display:flex; justify-content:space-between; margin-bottom:10px; }
  .slider-top .label{ font-family:var(--font-mono); font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:var(--text-dim); }
  .slider-top .val{ font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--amber); }
  input[type=range]{
    -webkit-appearance:none; width:100%; height:6px; background:var(--bg-raised); outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:18px; height:18px; background:var(--amber); cursor:pointer; border:2px solid #151505;
  }
  input[type=range]::-moz-range-thumb{ width:18px; height:18px; background:var(--amber); cursor:pointer; border:2px solid #151505; border-radius:0; }

  .device-panel{ padding:22px; }
  .device-panel h3{ font-family:var(--font-display); font-weight:700; font-size:15px; text-transform:uppercase; margin-bottom:14px; }
  .device-item{ display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--line); margin-bottom:10px; }
  .device-item svg{ width:20px; height:20px; color:var(--amber); flex-shrink:0; }
  .device-item .name{ font-family:var(--font-display); font-weight:600; font-size:14px; }
  .device-item .desc{ font-size:11.5px; color:var(--text-faint); margin-top:2px; }

  .btn-primary{
    margin-top:20px;
    font-family:var(--font-mono); font-size:12.5px; font-weight:500; letter-spacing:.06em; text-transform:uppercase;
    background:var(--amber); color:#151505; padding:12px 20px; border:none; display:inline-flex; align-items:center; gap:8px;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .btn-primary svg{ width:15px; height:15px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--bg-card); border:1px solid var(--amber); color:var(--text);
    padding:12px 20px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s ease;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media(max-width:820px){ .layout{ grid-template-columns:1fr; } }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
</style>
</head>
<body>
<header>
  <div class="wrap navbar">
    <a href="index.html" class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C12 2 7 7.5 7 12.5C7 15 8.2 16.7 9.5 17.5C9 16.5 9 15 9.5 14C10 15.5 11 16 11 16C10.5 14 11 12 12.5 10.5C12 12.5 12.5 14 13.5 14.5C13 12 14 9.5 16 8C15 10 15.5 12 16.5 13C17 13.7 17.5 14.7 17.5 16C17.5 19 15 21.5 12 21.5C9 21.5 6.5 19.3 6.5 16.3C6.5 11 12 2 12 2Z" fill="currentColor"/></svg>
      FREE FIRE HUB
    </a>
    <a href="index.html" class="btn-ghost">← Back to Home</a>
  </div>
</header>

<div class="page-head wrap">
  <div class="eyebrow">Aim Better</div>
  <h1>Sensitivity Settings</h1>
  <div class="tier-row" id="tierRow">
    <button class="tier-btn" data-tier="low">Low End (2GB RAM)</button>
    <button class="tier-btn" data-tier="mid">Mid Range (3-4GB)</button>
    <button class="tier-btn active" data-tier="high">High End (6GB+)</button>
  </div>
</div>

<section class="wrap layout">
  <div class="slider-panel bracket" id="sliderPanel"></div>

  <div class="device-panel bracket">
    <h3>Device-wise Recommendations</h3>
    <div class="device-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      <div><div class="name">2GB RAM</div><div class="desc">Low graphics, no fire button shake</div></div>
    </div>
    <div class="device-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      <div><div class="name">3GB – 4GB RAM</div><div class="desc">Medium graphics, balanced settings</div></div>
    </div>
    <div class="device-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      <div><div class="name">6GB+ RAM</div><div class="desc">High/Ultra graphics, 90-120 FPS</div></div>
    </div>
    <button class="btn-primary" id="copyBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy Settings
    </button>
  </div>
</section>

<div class="toast" id="toast">Settings copied to clipboard!</div>

<script>
  const PRESETS = {
    low:  { General:70, "Red Dot":65, "2x Scope":60, "4x Scope":55, "Sniper Scope":50, "Free Look":45 },
    mid:  { General:85, "Red Dot":80, "2x Scope":75, "4x Scope":68, "Sniper Scope":60, "Free Look":55 },
    high: { General:100, "Red Dot":95, "2x Scope":90, "4x Scope":85, "Sniper Scope":75, "Free Look":65 },
  };
  let activeTier = "high";

  function renderSliders(){
    const panel = document.getElementById("sliderPanel");
    const values = PRESETS[activeTier];
    panel.innerHTML = Object.entries(values).map(([label, val], i) => `
      <div class="slider-row">
        <div class="slider-top"><span class="label">${label}</span><span class="val" id="val-${i}">${val}</span></div>
        <input type="range" min="0" max="100" value="${val}" data-idx="${i}" data-label="${label}">
      </div>`).join("");
    panel.querySelectorAll("input[type=range]").forEach(input => {
      input.addEventListener("input", () => {
        document.getElementById("val-" + input.dataset.idx).textContent = input.value;
      });
    });
  }

  document.querySelectorAll(".tier-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tier-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTier = btn.dataset.tier;
      renderSliders();
    });
  });

  document.getElementById("copyBtn").addEventListener("click", () => {
    const lines = [];
    document.querySelectorAll("#sliderPanel input[type=range]").forEach(input => {
      lines.push(`${input.dataset.label}: ${input.value}`);
    });
    navigator.clipboard.writeText(lines.join("\n")).then(() => {
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    });
  });

  renderSliders();
</script>
</body>
</html>
