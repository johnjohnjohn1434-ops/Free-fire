<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bundles &amp; Skins — Free Fire Fan Hub</title>
<meta name="description" content="Free Fire bundles, outfits and skins gallery.">
<style>
  :root{
    --bg:#0d0f11; --bg-raised:#15181b; --bg-card:#1a1e22; --line:#2a2f34;
    --amber:#ffb020; --text:#eef1f3; --text-dim:#8b939a; --text-faint:#565d63;
    --font-display:'Rajdhani','Oswald','Arial Narrow',sans-serif; --font-body:'Inter','Segoe UI',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--font-body); }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; } img{ max-width:100%; display:block; }
  .wrap{ max-width:1100px; margin:0 auto; padding:0 20px; }
  header{ position:sticky; top:0; z-index:100; background:rgba(13,15,17,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .navbar{ display:flex; align-items:center; justify-content:space-between; height:64px; }
  .brand{ font-family:var(--font-display); font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; }
  .brand svg{ color:var(--amber); }
  .btn-ghost{ font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; background:transparent; color:var(--text); padding:9px 16px; border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--amber); color:var(--amber); }
  .bracket{ position:relative; border:1px solid var(--line); background:var(--bg-card); }
  .bracket::before,.bracket::after{ content:""; position:absolute; width:14px; height:14px; border:2px solid var(--amber); opacity:.85; }
  .bracket::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .bracket::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); display:flex; align-items:center; gap:8px; }
  .eyebrow::before{ content:""; width:16px; height:1px; background:var(--amber); }
  .page-head{ padding:44px 0 24px; border-bottom:1px solid var(--line); }
  .page-head h1{ font-family:var(--font-display); font-weight:700; font-size:38px; text-transform:uppercase; margin-top:8px; }
  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:22px; }
  .chip{ font-family:var(--font-mono); font-size:11.5px; letter-spacing:.04em; text-transform:uppercase; background:transparent; border:1px solid var(--line); color:var(--text-dim); padding:9px 14px; }
  .chip.active{ border-color:var(--amber); color:var(--amber); background:rgba(255,176,32,.06); }
  section{ padding:32px 0 60px; }
  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .bundle-card{ overflow:hidden; }
  .bundle-card .thumb{ aspect-ratio:3/4; background:linear-gradient(135deg,#22262a,#141618); position:relative; overflow:hidden; }
  .bundle-card .thumb img{ width:100%; height:100%; object-fit:cover; }
  .bundle-card .body{ padding:12px 14px 14px; }
  .bundle-card h3{ font-family:var(--font-display); font-weight:600; font-size:15px; }
  .rarity{ position:absolute; top:8px; left:8px; font-family:var(--font-mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; padding:3px 7px; }
  .rarity.legendary{ background:linear-gradient(90deg,#ffb020,#ff7a20); color:#151505; }
  .rarity.epic{ background:#8b3fe8; color:#fff; }
  .rarity.rare{ background:#2f7bff; color:#fff; }
  @media(max-width:900px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  @media(max-width:600px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
</style>
</head>
<body>
<header>
  <div class="wrap navbar">
    <a href="index.html" class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C12 2 7 7.5 7 12.5C7 15 8.2 16.7 9.5 17.5C9 16.5 9 15 9.5 14C10 15.5 11 16 11 16C10.5 14 11 12 12.5 10.5C12 12.5 12.5 14 13.5 14.5C13 12 14 9.5 16 8C15 10 15.5 12 16.5 13C17 13.7 17.5 14.7 17.5 16C17.5 19 15 21.5 12 21.5C9 21.5 6.5 19.3 6.5 16.3C6.5 11 12 2 12 2Z" fill="currentColor"/></svg>
      FREE FIRE HUB
    </a>
    <a href="index.html" class="btn-ghost">← Back to Home</a>
  </div>
</header>

<div class="page-head wrap">
  <div class="eyebrow">Cosmetics Gallery</div>
  <h1>Bundles &amp; Skins</h1>
  <div class="chip-row" id="catChips">
    <button class="chip active" data-cat="all">All</button>
    <button class="chip" data-cat="bundle">Bundles</button>
    <button class="chip" data-cat="gun-skin">Gun Skins</button>
    <button class="chip" data-cat="emote">Emotes</button>
    <button class="chip" data-cat="vehicle">Vehicles</button>
    <button class="chip" data-cat="backpack">Backpack</button>
  </div>
</div>

<section class="wrap">
  <div class="grid" id="bundleGrid"></div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCGedP2oNKGRxI4VHAa2rD1uS7kvlu7278", authDomain: "freefire-6e80e.firebaseapp.com",
    projectId: "freefire-6e80e", storageBucket: "freefire-6e80e.firebasestorage.app",
    messagingSenderId: "249508261364", appId: "1:249508261364:web:b846118ee5952e3b099da1", measurementId: "G-W85RYGBJE0"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const FALLBACK = [
    { id:"cobra", name:"Cobra Rage Bundle", category:"bundle", rarity:"legendary" },
    { id:"booyah-day", name:"Booyah Day Bundle", category:"bundle", rarity:"epic" },
    { id:"rampage", name:"Rampage Bundle", category:"bundle", rarity:"legendary" },
    { id:"hip-hop", name:"Hip Hop Bundle", category:"bundle", rarity:"rare" },
    { id:"alpha", name:"Alpha Flamboso", category:"gun-skin", rarity:"epic" },
    { id:"bandit", name:"Bandit Bundle", category:"bundle", rarity:"rare" },
  ];

  let items = [], activeCat = "all";

  async function load(){
    try {
      const snap = await getDocs(collection(db, "bundles"));
      items = snap.empty ? FALLBACK : snap.docs.map(d => ({ id:d.id, ...d.data() }));
    } catch (e) { console.warn("bundles load failed:", e.message); items = FALLBACK; }
    render();
  }

  function escapeHtml(str){ return String(str??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  function render(){
    const filtered = activeCat === "all" ? items : items.filter(i => i.category === activeCat);
    const grid = document.getElementById("bundleGrid");
    if (!filtered.length) { grid.innerHTML = `<div style="grid-column:1/-1;color:var(--text-dim);padding:40px;text-align:center;">எதுவும் இல்ல.</div>`; return; }
    grid.innerHTML = filtered.map(b => `
      <div class="bundle-card bracket">
        <div class="thumb">
          ${b.imageUrl ? `<img src="${b.imageUrl}" alt="${escapeHtml(b.name)}">`:''}
          <span class="rarity ${b.rarity||'rare'}">${b.rarity||'rare'}</span>
        </div>
        <div class="body"><h3>${escapeHtml(b.name)}</h3></div>
      </div>`).join("");
  }

  document.querySelectorAll("#catChips .chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll("#catChips .chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      activeCat = chip.dataset.cat;
      render();
    });
  });

  load();
</script>
</body>
</html>
