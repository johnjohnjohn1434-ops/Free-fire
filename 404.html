<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f11">
<title>Page Not Found — Free Fire Fan Hub</title>
<style>
  :root{
    --bg:#0d0f11; --bg-card:#1a1e22; --line:#2a2f34; --amber:#ffb020;
    --text:#eef1f3; --text-dim:#8b939a;
    --font-display:'Rajdhani','Oswald','Arial Narrow',sans-serif; --font-body:'Inter','Segoe UI',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:radial-gradient(ellipse at 30% 20%, rgba(255,176,32,.08), transparent 55%), var(--bg);
    color:var(--text); font-family:var(--font-body); min-height:100vh;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
  }
  a{ color:inherit; text-decoration:none; }
  .box{ position:relative; border:1px solid var(--line); background:var(--bg-card); padding:48px 36px; max-width:440px; }
  .box::before,.box::after{ content:""; position:absolute; width:18px; height:18px; border:2px solid var(--amber); opacity:.85; }
  .box::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .box::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .code{ font-family:var(--font-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--amber); }
  h1{ font-family:var(--font-display); font-weight:700; font-size:76px; margin:10px 0; }
  p{ color:var(--text-dim); font-size:14px; margin-bottom:26px; }
  .btn-primary{
    font-family:var(--font-mono); font-size:12.5px; font-weight:500; letter-spacing:.06em; text-transform:uppercase;
    background:var(--amber); color:#151505; padding:12px 22px; border:none; display:inline-block;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
</style>
</head>
<body>
  <div class="box">
    <div class="code">Error 404</div>
    <h1>LOST</h1>
    <p>இந்த page கிடைக்கல். Link தவறா இருக்கலாம் அல்லது இந்த page இன்னும் build ஆகல.</p>
    <a href="index.html" class="btn-primary">Back to Home</a>
  </div>
</body>
</html>
